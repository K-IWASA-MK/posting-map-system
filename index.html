<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>POSTING MAP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="apple-touch-icon" href="https://area-management.github.io/posting-map-system/assets/icon180-v2.png?v=100">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Noto+Sans+JP:wght@400;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#1a237e', light: '#283593', dark: '#0d1642' },
            apple: { light: '#f5f5f7', dark: '#000000' }
          },
          fontFamily: { sans: ['"Inter"', '"Noto Sans JP"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .btn-neu { @apply transition-all duration-300 active:scale-95; }
    .neu-flat { @apply bg-white dark:bg-[#1c1c1e] shadow-[8px_8px_20px_rgba(0,0,0,0.05)] dark:shadow-[8px_8px_20px_rgba(0,0,0,0.4)]; }
    .neu-inset { @apply bg-gray-50 dark:bg-black/20 shadow-[inset_4px_4px_10px_rgba(0,0,0,0.05)] dark:shadow-[inset_4px_4px_10px_rgba(0,0,0,0.5)]; }
  </style>
</head>
<body class="bg-apple-light dark:bg-apple-dark text-[#1d1d1f] dark:text-[#f5f5f7] font-sans antialiased overflow-hidden select-none">
  <div id="screen-gateway" class="fixed inset-0 z-[1000] bg-apple-light dark:bg-apple-dark flex flex-col items-center justify-center pt-32 pb-40 px-10 text-center">
    <div class="fixed top-0 left-0 right-0 px-10 py-10 flex justify-between items-center z-[1001]">
      <h1 class="text-3xl font-black tracking-tighter text-navy dark:text-white leading-none">POSTING MAP</h1>
      <div class="bg-white/60 dark:bg-white/10 px-5 py-2.5 rounded-full flex items-center gap-4 shadow-neu-inset-light dark:shadow-neu-inset-dark text-xs font-black">
        <div class="w-2 h-2 bg-green-500 rounded-full"></div>
        <span>0%</span>
      </div>
    </div>
    <div class="flex flex-col items-center justify-center mb-8 mt-10">
      <div class="w-32 h-32 bg-apple-light dark:bg-[#1c1c1e] rounded-[3rem] shadow-neu-light dark:shadow-neu-dark flex items-center justify-center overflow-hidden mb-8 p-1">
        <img src="https://area-management.github.io/posting-map-system/assets/icon180-v2.png?v=100" class="w-full h-full object-cover rounded-[2.8rem]">
      </div>
      <p class="text-gray-500 dark:text-gray-400 font-bold leading-relaxed text-sm">ホーム画面へ追加してから<br>アプリをご利用ください</p>
    </div>
    <div class="w-full max-w-sm space-y-10">
      <div class="bg-white/40 dark:bg-white/5 backdrop-blur-2xl rounded-[2.5rem] p-8 shadow-neu-light dark:shadow-neu-dark border border-white/20">
        <button onclick="forceStart()" class="btn-neu w-full bg-navy dark:bg-blue-600 text-white rounded-2xl py-5 text-xl font-black shadow-xl">アプリを起動する</button>
      </div>
      <p class="text-[10px] font-black text-gray-400 dark:text-gray-600 uppercase tracking-[0.3em]">Operational Environment</p>
    </div>
  </div>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyA-VSYqJ_54FWoEhi3XfE5GXyN3WHUZrD2heRBrCrQOw2WTW4utXYk6nReMmjDJfOY/exec?page=app";
    function forceStart() { window.location.href = GAS_URL; }
  </script>
</body>
</html>
