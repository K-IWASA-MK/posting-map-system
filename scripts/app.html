<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>POSTING APP PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Noto+Sans+JP:wght@400;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: { navy: '#1a237e', apple: '#f5f5f7' },
          fontFamily: { sans: ['"Inter"', '"Noto Sans JP"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .page { display: none; opacity: 0; transform: translateY(20px); transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
    .page.active { display: block; opacity: 1; transform: none; }
    
    /* Neumorphic Base */
    .neu-flat { @apply bg-white dark:bg-[#1c1c1e] shadow-[8px_8px_20px_rgba(0,0,0,0.05)] dark:shadow-[8px_8px_20px_rgba(0,0,0,0.4)]; }
    .neu-inset { @apply bg-gray-50 dark:bg-black/20 shadow-[inset_4px_4px_10px_rgba(0,0,0,0.05)] dark:shadow-[inset_4px_4px_10px_rgba(0,0,0,0.5)]; }
  </style>
</head>
<body class="bg-apple dark:bg-black text-[#1d1d1f] dark:text-[#f5f5f7] font-sans antialiased overflow-hidden select-none transition-colors duration-500">

  <!-- Loading Overlay -->
  <div id="loading" class="fixed inset-0 bg-apple dark:bg-black z-[2000] flex items-center justify-center transition-all duration-700">
    <div class="w-12 h-12 border-[3px] border-navy/10 dark:border-white/10 border-t-navy dark:border-t-white rounded-full animate-spin"></div>
  </div>

  <div id="app" class="flex flex-col h-screen overflow-hidden">
    
    <!-- Top Identity (Minimally placed) -->
    <header class="safe-top px-10 py-10 flex justify-between items-center transition-opacity duration-300">
      <div>
        <h1 class="text-3xl font-black tracking-tighter text-navy dark:text-white">COMMAND</h1>
        <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mt-2">Operational Portal</p>
      </div>
      <div id="sync-status" class="w-2.5 h-2.5 bg-green-500 rounded-full shadow-[0_0_15px_#22c55e]"></div>
    </header>

    <!-- Unified Content Area -->
    <main id="content" class="flex-1 overflow-y-auto hide-scrollbar px-10 space-y-12 pb-48">

      <!-- SECTION: GUIDE -->
      <section id="page-guide" class="page active space-y-10">
        <div class="neu-flat rounded-[3rem] p-12 text-center">
          <div class="text-[10px] font-black text-gray-400 uppercase tracking-[0.4em] mb-6">Introduction</div>
          <h2 class="text-4xl font-black text-navy dark:text-white leading-tight mb-6">勝利への<br>最短距離を。</h2>
          <p class="text-sm text-gray-500 leading-relaxed font-medium">洗練された UI で、あなたの活動を<br>インテリジェンスなものへ。</p>
        </div>
        <div class="space-y-6">
          <div class="neu-flat rounded-[2.5rem] p-10 flex items-center gap-8">
            <span class="text-4xl font-black text-navy/10 dark:text-white/10">01</span>
            <p class="text-sm font-bold text-gray-500">お名前を「設定」から登録</p>
          </div>
          <div class="neu-flat rounded-[2.5rem] p-10 flex items-center gap-8">
            <span class="text-4xl font-black text-navy/10 dark:text-white/10">02</span>
            <p class="text-sm font-bold text-gray-500">「エリア」を選び、ミッション開始</p>
          </div>
        </div>
      </section>

      <!-- SECTION: AREA LIST -->
      <section id="page-area" class="page space-y-10">
        <div class="neu-inset rounded-[2.5rem] p-4 flex items-center">
          <span class="ml-6 text-xl opacity-20">🔍</span>
          <input type="text" placeholder="エリア検索..." oninput="filterAreas()" 
                 class="flex-1 bg-transparent border-none p-6 text-lg font-bold outline-none placeholder:text-gray-300">
        </div>
        <div id="area-list" class="space-y-6">
          <!-- Dynamic List: Simplified Template -->
        </div>
      </section>

      <!-- SECTION: DETAIL (One-Handed Focus) -->
      <section id="page-detail" class="page space-y-10">
        <div id="detail-header" class="text-center pt-4">
          <h2 id="detail-title" class="text-3xl font-black text-navy dark:text-white tracking-tighter">AREA DETAIL</h2>
          <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mt-2">Tactical Breakdown</p>
        </div>
        <div id="detail-list" class="space-y-8">
          <!-- Cards -->
        </div>
        <!-- Thumb-reachable Close -->
        <button onclick="switchPage('area')" class="w-full neu-flat rounded-3xl py-6 text-sm font-black text-navy dark:text-white shadow-xl">
          エリア一覧に戻る
        </button>
      </section>

      <!-- SECTION: STATS -->
      <section id="page-stats" class="page space-y-10">
        <div class="grid grid-cols-2 gap-8">
          <div class="neu-flat rounded-[2.5rem] p-10 text-center">
            <div id="kpi-pct" class="text-5xl font-black text-navy dark:text-white leading-none mb-3 tracking-tighter">0%</div>
            <div class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Progress</div>
          </div>
          <div class="neu-flat rounded-[2.5rem] p-10 text-center">
            <div id="kpi-done" class="text-5xl font-black text-navy dark:text-white leading-none mb-3 tracking-tighter">0</div>
            <div class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Done</div>
          </div>
        </div>
        <div id="ranking-list" class="neu-flat rounded-[3rem] p-12 space-y-10">
          <h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.3em] mb-4 text-center">Specialist Rankings</h3>
          <!-- Rankings -->
        </div>
      </section>

    </main>

    <!-- Bottom Navigation (Primary Thumb Hub) -->
    <nav class="fixed bottom-12 left-10 right-10 flex justify-between gap-6 z-[100]">
      <div class="flex-1 bg-white/80 dark:bg-white/10 backdrop-blur-3xl rounded-full shadow-2xl border border-white/20 p-2 flex justify-around ring-1 ring-black/5">
        <button onclick="switchPage('guide', this)" class="nav-btn active flex flex-col items-center justify-center w-20 py-4 transition-all opacity-30 group">
          <span class="text-3xl mb-1 group-[.active]:scale-125 transition-transform">📋</span>
        </button>
        <button onclick="switchPage('area', this)" class="nav-btn flex flex-col items-center justify-center w-20 py-4 transition-all opacity-30 group">
          <span class="text-3xl mb-1 group-[.active]:scale-125 transition-transform">📍</span>
        </button>
        <button onclick="switchPage('stats', this)" class="nav-btn flex flex-col items-center justify-center w-20 py-4 transition-all opacity-30 group">
          <span class="text-3xl mb-1 group-[.active]:scale-125 transition-transform">📊</span>
        </button>
      </div>
      <button onclick="loadData()" class="w-20 h-20 bg-navy text-white rounded-full flex items-center justify-center text-2xl shadow-xl active:scale-90 transition-all">🔄</button>
    </nav>
  </div>

  <script>
    let allPoints = []; let areaSummary = {}; let roster = [];
    const $ = id => document.getElementById(id);

    function switchPage(name, el) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(n => { n.classList.remove('active'); n.style.opacity = '0.3'; });
      $('page-' + name).classList.add('active');
      if(el) { el.classList.add('active'); el.style.opacity = '1'; }
      $('content').scrollTop = 0;
    }

    function renderData(data) {
      if(!data || !data.points) return;
      allPoints = data.points; areaSummary = data.summary;
      $('area-list').innerHTML = Object.entries(areaSummary).map(([n, s]) => `
        <div class="neu-flat rounded-[2rem] p-10 flex items-center active:scale-[0.98] transition-all" onclick="openDetail('${n}')">
          <div class="w-3 h-3 rounded-full mr-8 ${s.done/s.total >= 1 ? 'bg-green-500 shadow-[0_0_15px_#22c55e]' : 'bg-rose-500'}"></div>
          <div class="flex-1">
            <div class="text-xl font-black text-navy dark:text-white tracking-tighter">${n}</div>
            <div class="text-[9px] font-bold text-gray-400 mt-1 uppercase tracking-widest">${s.done} / ${s.total} Units</div>
          </div>
          <span class="text-gray-300 text-2xl font-light">›</span>
        </div>`).join('');
      updateStats(); $('loading').classList.add('hidden');
    }

    function openDetail(name) {
      $('detail-title').textContent = name;
      const pts = allPoints.filter(p => p.area === name);
      $('detail-list').innerHTML = pts.map((p, i) => `
        <div class="neu-flat rounded-[2.5rem] p-10 space-y-8">
          <div class="flex justify-between items-start gap-6">
            <div class="text-xl font-black text-navy dark:text-white tracking-tight leading-tight">${p.address}</div>
            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.address)}" target="_blank" class="w-14 h-14 neu-flat rounded-2xl flex items-center justify-center text-2xl">📍</a>
          </div>
          <div class="flex flex-col gap-6">
            <label class="neu-inset rounded-3xl p-6 flex items-center gap-5 cursor-pointer active:scale-[0.98] transition-all">
              <input type="checkbox" class="w-8 h-8 rounded-xl accent-navy" ${p.status==='done'?'checked':''} onchange="updateRecord('${name}',${i},'done',this.checked)">
              <span class="text-[10px] font-black uppercase tracking-widest text-navy dark:text-white">${p.status==='done'?'MISSION COMPLETED':'READY TO DEPLOY'}</span>
            </label>
            <div class="grid grid-cols-2 gap-6">
              <select onchange="updateRecord('${name}',${i},'count',this.value)" class="neu-inset rounded-2xl p-5 text-xs font-black text-navy dark:text-white outline-none appearance-none">
                <option value="">枚数</option>${[10,30,50,100,200].map(v=>`<option value="${v}" ${p.count==v?'selected':''}>${v}枚</option>`).join('')}
              </select>
              <select onchange="updateRecord('${name}',${i},'staff',this.value)" class="neu-inset rounded-2xl p-5 text-xs font-black text-navy dark:text-white outline-none appearance-none">
                <option value="">担当者</option>${roster.map(r=>`<option value="${r}" ${p.staff==r?'selected':''}>${r}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>`).join('');
      switchPage('detail');
    }

    function updateStats() {
      const done = allPoints.filter(p => p.status === 'done').length;
      const pct = allPoints.length ? Math.round(done / allPoints.length * 100) : 0;
      $('kpi-pct').textContent = pct + '%'; $('kpi-done').textContent = done;
    }

    function updateRecord(area, idx, field, val) {
      // Logic from before, simplified call
      google.script.run.withSuccessHandler(loadData).updateRecord(area, idx, {[field]: val, done: field==='done'?val:undefined});
    }

    function loadData() {
      $('loading').classList.remove('hidden');
      google.script.run.withSuccessHandler(renderData).getMapData();
      google.script.run.withSuccessHandler(list => { roster = list || []; }).getRoster();
    }

    window.onload = loadData;
  </script>
</body>
</html>
