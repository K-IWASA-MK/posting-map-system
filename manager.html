<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ポスティング 司令室</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="司令室">

<meta name="theme-color" content="#c97a00">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">

<link rel="apple-touch-icon"
sizes="180x180"
href="https://area-management.github.io/posting-map-system/assets/icon-manager-180.png">

<link rel="icon"
href="https://area-management.github.io/posting-map-system/assets/icon-manager-180.png">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:
  linear-gradient(
    180deg,
    #f8f8f8 0%,
    #ececec 100%
  );

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  overflow:hidden;
}

.container{
  width:100%;
  max-width:420px;

  display:flex;
  flex-direction:column;
  align-items:center;

  padding:40px 30px;
}

.logo-box{

  width:110px;
  height:110px;

  background:#ffffff;

  border-radius:28px;

  display:flex;
  justify-content:center;
  align-items:center;

  box-shadow:
  0 15px 40px rgba(0,0,0,0.1);

  margin-bottom:30px;

  animation:float 4s ease-in-out infinite;
}

.logo-box img{
  width:56px;
  height:56px;
}

.sub{

  font-size:16px;
  font-weight:bold;
  line-height:1.6;

  color:#e63946;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.15);

  text-align:center;

  margin-top:-10px;
  margin-bottom:35px;
}

/* PIN Input Styles */
.pin-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin-bottom: 30px;
}

.pin-label {
  font-size: 14px;
  color: #666;
  font-weight: bold;
}

.pin-inputs {
  display: flex;
  gap: 12px;
}

.pin-dot {
  width: 50px;
  height: 60px;
  border: 2px solid #ddd;
  background: white;
  border-radius: 12px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  color: #c97a00;
  outline: none;
  transition: all 0.2s ease;
  caret-color: transparent;
}

.pin-dot:focus {
  border-color: #c97a00;
  box-shadow: 0 0 10px rgba(201,122,0,0.1);
}

/* Launch Button Hidden Initially */
.launch-area {
  width: 100%;
  height: 70px;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px);
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.launch-area.active {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.launch-btn{
  width:100%;
  background:
  linear-gradient(
    180deg,
    #e29100 0%,
    #c97a00 100%
  );
  color:white;
  text-decoration:none;
  border-radius:999px;
  padding:18px 20px;
  text-align:center;
  font-size:22px;
  font-weight:900;
  letter-spacing:0.03em;
  box-shadow:
  0 12px 30px rgba(201,122,0,0.3);
  transition:all .18s ease;
}

.launch-btn:active{
  transform:scale(0.97);
}

.bottom-note{
  margin-top:28px;
  font-size:13px;
  color:#999;
  letter-spacing:0.02em;
}

@keyframes float{
  0%{ transform:translateY(0px); }
  50%{ transform:translateY(-8px); }
  100%{ transform:translateY(0px); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.shake {
  animation: shake 0.3s ease-in-out 2;
}

</style>
</head>

<body>

<div class="container">

  <div class="logo-box">
    <img src="https://area-management.github.io/posting-map-system/assets/icon-manager-180.png">
  </div>

  <div class="sub">
    ホーム画面へ追加してから<br>
    アプリをご利用ください
  </div>

  <!-- Passcode Section -->
  <div class="pin-section" id="pinSection">
    <div class="pin-label">司令室へのアクセス（管理番号）</div>
    <div class="pin-inputs">
      <input type="number" pattern="\d*" class="pin-dot" maxlength="1" oninput="moveNext(this, 0)">
      <input type="number" pattern="\d*" class="pin-dot" maxlength="1" oninput="moveNext(this, 1)">
      <input type="number" pattern="\d*" class="pin-dot" maxlength="1" oninput="moveNext(this, 2)">
      <input type="number" pattern="\d*" class="pin-dot" maxlength="1" oninput="moveNext(this, 3)">
    </div>
  </div>

  <div class="launch-area" id="launchArea">
    <a
      class="launch-btn"
      href="https://script.google.com/macros/s/AKfycbyvR8B89xGhB_kr5OAFzgH0rAIUffGY2iQNqnyv4r32KZyg6GpMemrD4NuLfGrQbpeSTA/exec?mode=admin"
    >
      司令室を起動する
    </a>
  </div>

  <div class="bottom-note">
    Posting Management System
  </div>

</div>

<script>
  const CORRECT_PIN = "2026";
  const inputs = document.querySelectorAll('.pin-dot');
  const launchArea = document.getElementById('launchArea');
  const pinSection = document.getElementById('pinSection');

  function moveNext(current, index) {
    if (current.value.length >= 1) {
      current.value = current.value.slice(0, 1);
      if (index < 3) {
        inputs[index + 1].focus();
      }
    }
    
    checkPin();
  }

  // Handle backspace
  inputs.forEach((input, index) => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !input.value && index > 0) {
        inputs[index - 1].focus();
      }
    });
  });

  function checkPin() {
    let currentPin = "";
    inputs.forEach(input => currentPin += input.value);

    if (currentPin.length === 4) {
      if (currentPin === CORRECT_PIN) {
        // Success
        launchArea.classList.add('active');
        pinSection.style.display = 'none';
        document.querySelector('.sub').innerHTML = "認証に成功しました<br>司令室へ入室可能です";
        document.querySelector('.sub').style.color = "#2e7d32"; // Green
      } else {
        // Fail
        document.getElementById('pinSection').classList.add('shake');
        setTimeout(() => {
          document.getElementById('pinSection').classList.remove('shake');
          inputs.forEach(input => input.value = "");
          inputs[0].focus();
        }, 600);
      }
    }
  }
</script>

</body>
</html>
